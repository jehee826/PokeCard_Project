spring:
  application:
    name: back

  # 1. MySQL DB 설정 (주석 해제 및 설정 최적화)
  datasource:
    url: jdbc:mysql://localhost:3306/board?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: sjh4335
    password: 1234 # 본인의 MySQL root 계정 비밀번호를 입력하세요!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA 설정 (MySQLDialect 적용)
  jpa:
    hibernate:
      # 처음 실행 시 테이블이 없다면 자동으로 만들어주도록 update로 설정합니다.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # MySQL 8.0 이상을 사용하신다면 아래 dialect가 적합합니다.
        dialect: org.hibernate.dialect.MySQLDialect

  # 3. 메일 설정 (환경 변수 누락 시 실행 에러 방지를 위해 직접 입력 권장)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 4. JWT 설정 (필터와 Provider에서 읽어갈 값)
jwt:
  secret: your-very-secure-random-secret-key-at-least-32-chars-long